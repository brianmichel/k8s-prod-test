apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: playground-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: playground-api
  minReplicas: 2
  maxReplicas: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

