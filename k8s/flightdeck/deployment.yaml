apiVersion: apps/v1
kind: Deployment
metadata:
  name: flightdeck
  labels:
    app.kubernetes.io/name: flightdeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flightdeck
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flightdeck
    spec:
      serviceAccountName: flightdeck
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flightdeck
          image: flightdeck:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 250m
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
