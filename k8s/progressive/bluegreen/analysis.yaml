apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: playground-api-preview-smoke
spec:
  args:
    - name: service-name
  metrics:
    - name: readyz
      provider:
        job:
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke
                    image: busybox:1.36.1
                    imagePullPolicy: IfNotPresent
                    command: [sh, -c]
                    args:
                      - wget -qO- "http://{{args.service-name}}:8080/readyz" >/dev/null

